startCommand:
  type: stdio
  configSchema:
    type: object
    required:
      - NARA_API_KEY
    properties:
      NARA_API_KEY:
        type: string
        title: "data.go.kr Service Key (Decoding)"
        description: "공공데이터포털 인증키(디코딩 원본). 조달청_나라장터 입찰공고정보서비스 활용신청 후 발급받은 Decoding 키를 입력하세요."
      NARA_PRESPEC_API_KEY:
        type: string
        title: "Prespec API Key (optional)"
        description: "사전규격서비스 활용신청이 별도 승인된 경우 해당 키. 미지정 시 NARA_API_KEY 재사용."
  commandFunction: |
    (config) => ({
      command: "bash",
      args: ["scripts/run-mcp.sh", "nara-jangteo"],
      env: {
        NARA_API_KEY: config.NARA_API_KEY,
        NARA_PRESPEC_API_KEY: config.NARA_PRESPEC_API_KEY || config.NARA_API_KEY
      }
    })

metadata:
  name: KONEPS_sionlab
  displayName: "나라장터 MCP (KONEPS)"
  description: "한국 나라장터(KONEPS/G2B) 공공조달 데이터를 Claude로 자연어 질의. 입찰공고, 낙찰정보, 계약정보, RFP 파일 추출 지원."
  descriptionEn: "Query Korean government procurement (KONEPS/G2B) data with Claude via MCP. Bid announcements, successful bids, contracts, and RFP file extraction."
  author: KKHWAN
  homepage: https://github.com/kkhwan1/KONEPS_sionlab
  repository: https://github.com/kkhwan1/KONEPS_sionlab
  license: MIT
  tags:
    - korea
    - procurement
    - koneps
    - narajangteo
    - g2b
    - public-data
    - government
